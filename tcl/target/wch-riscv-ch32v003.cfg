#interface wlink
adapter driver wlinke
adapter speed 6000
transport select sdi

chip_id CH32V003
set _CHIPNAME wch_riscv
sdi newtap $_CHIPNAME cpu -irlen 5 -expected-id 0x00001

set _TARGETNAME $_CHIPNAME.cpu

target create $_TARGETNAME.0 wch_riscv -chain-position $_TARGETNAME
$_TARGETNAME.0 configure -work-area-phys 0x20000000 -work-area-size 10000 -work-area-backup 1

set _USER_FLASHNAME $_CHIPNAME.user
flash bank $_USER_FLASHNAME wch_riscv 0x08000000 0x00004000 0 0 $_TARGETNAME.0

set _BOOT_FLASHNAME $_CHIPNAME.boot
flash bank $_BOOT_FLASHNAME wch_riscv 0x1ffff000 0x00001000 0 0 $_TARGETNAME.0

echo "Ready for CH32V003 USER/BOOT flash banks"
